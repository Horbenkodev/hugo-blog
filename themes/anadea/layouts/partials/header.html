<nav class="header" aria-label="Main navigation" role="navigation">
  <div class="header__container">
    <a href="https://anadea.info/" class="header__wrapperLink">
      <span class="sr-only">Anadea</span>
      <img
        class="header__logo"
        alt="Anadea logo"
        aria-hidden="true"
        width="76"
        height="9"
        src="/blog/img/logoMobile.svg"
      />
      <img
        class="header__logo desktop"
        alt="Anadea logo"
        aria-hidden="true"
        width="56"
        height="42"
        src="/blog/img/logo.svg"
      />
    </a>

    {{ $uniqID := hash.FNV32a "Toggle" }}
    <div class="header__burger">
      <button class="burger" aria-label="Toggle menu" aria-expanded="false" aria-controls="{{ $uniqID }}">
        <div class="burger__inner"></div>
      </button>
    </div>

    <div class="header__menu">
      <ul class="menu" id="{{ $uniqID }}">
        <li class="menu__item" data-submenu-item="services">
          <button class="menu__link"><span>Services</span></button>
        </li>
        <li class="menu__item" data-submenu-item="success_stories">
          <button class="menu__link"><span>Success stories</span></button>
        </li>
        <li class="menu__item" data-submenu-item="industries">
          <button class="menu__link"><span>Industries</span></button>
        </li>
        <li class="menu__item" data-submenu-item="company">
          <button class="menu__link"><span>Company</span></button>
        </li>
        <li class="menu__item" data-submenu-item="insights">
          <button class="menu__link"><span>Insights</span></button>
        </li>
      </ul>
      <a href="https://anadea.info/free-project-estimate" class="header__callToAction">Contact us</a>
    </div>

  </div>

  {{ partial "menu/mobile_menu.html" . }}

  <div id="services" class="header__submenuItem" style="display: none;">
    {{ partial "menu/services.html" . }}
  </div>
  <div id="success_stories" class="header__submenuItem" style="display: none;">
    {{ partial "menu/success_stories.html" . }}
  </div>
  <div id="industries" class="header__submenuItem" style="display: none;">
    {{ partial "menu/industries.html" . }}
  </div>
  <div id="company" class="header__submenuItem" style="display: none;">
    {{ partial "menu/company.html" . }}
  </div>
  <div id="insights" class="header__submenuItem" style="display: none;">
    {{ partial "menu/insights.html" . }}
  </div>

  <div class="header__shadow"></div>
</nav>
